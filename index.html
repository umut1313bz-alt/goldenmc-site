<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<title>GoldenMC Pro</title>

<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:sans-serif;}

body{
    background:linear-gradient(135deg,#020617,#0f172a);
    color:white;
}

/* NAV */
nav{
    display:flex;
    gap:15px;
    padding:15px;
    background:rgba(0,0,0,0.6);
    backdrop-filter:blur(10px);
}

nav button{
    background:#1d4ed8;
    border:none;
    padding:10px 18px;
    border-radius:10px;
    color:white;
    cursor:pointer;
    transition:0.2s;
}

nav button:hover{
    background:#2563eb;
}

/* PAGE */
.page{
    display:none;
    padding:30px;
}

.active{display:block;}

/* CARD */
.card{
    background:rgba(255,255,255,0.05);
    padding:20px;
    border-radius:20px;
    backdrop-filter:blur(15px);
    margin-bottom:20px;
}

/* INPUT */
input{
    padding:10px;
    margin:5px 0;
    width:200px;
    border:none;
    border-radius:8px;
}

/* BUTTON */
.btn{
    padding:10px 20px;
    background:#22c55e;
    border:none;
    border-radius:10px;
    color:white;
    cursor:pointer;
}

/* PANEL */
#panel span{
    display:block;
    margin:5px 0;
    font-size:18px;
}
</style>
</head>

<body>

<nav>
    <button onclick="go('home')">Ana</button>
    <button onclick="go('shop')">Mağaza</button>
    <button onclick="go('credit')">Kredi</button>
    <button onclick="go('support')">Destek</button>
    <button onclick="go('panel')">Panel</button>
    <button onclick="go('login')">Giriş</button>
</nav>

<!-- ANA -->
<div id="home" class="page active">
    <div class="card">
        <h1>GoldenMC PRO</h1>
        <p>Gerçek platform hissi 🔥</p>
    </div>
</div>

<!-- SHOP -->
<div id="shop" class="page">
    <div class="card">
        <h2>VIP Satın Al</h2>
        <button class="btn" onclick="buyVIP()">VIP (100₺)</button>
    </div>
</div>

<!-- CREDIT -->
<div id="credit" class="page">
    <div class="card">
        <h2>Kredi</h2>
        <button class="btn" onclick="buyCredit()">100 Kredi (50₺)</button>
    </div>
</div>

<!-- SUPPORT -->
<div id="support" class="page">
    <div class="card">
        <h2>Destek</h2>
        <p>yakında ticket sistemi eklenecek</p>
    </div>
</div>

<!-- PANEL -->
<div id="panel" class="page">
    <div class="card">
        <h2>Kullanıcı Paneli</h2>
        <span id="pUser"></span>
        <span id="pCredit"></span>
        <span id="pVIP"></span>
    </div>
</div>

<!-- LOGIN -->
<div id="login" class="page">
    <div class="card">
        <h2>Giriş / Kayıt</h2>
        <input id="user" placeholder="Kullanıcı"><br>
        <input id="pass" type="password" placeholder="Şifre"><br>
        <button class="btn" onclick="register()">Kayıt</button>
        <button class="btn" onclick="login()">Giriş</button>
    </div>
</div>

<script>

let currentUser = null;

function go(id){
    document.querySelectorAll('.page').forEach(p=>p.classList.remove('active'));
    document.getElementById(id).classList.add('active');
    updatePanel();
}

/* KAYIT */
function register(){
    let u = user.value;
    let p = pass.value;

    let data = {
        pass:p,
        credit:0,
        vip:false
    };

    localStorage.setItem("acc_"+u, JSON.stringify(data));
    alert("Kayıt tamam");
}

/* LOGIN */
function login(){
    let u = user.value;
    let p = pass.value;

    let data = JSON.parse(localStorage.getItem("acc_"+u));

    if(data && data.pass === p){
        currentUser = u;
        alert("Giriş başarılı");
        go('panel');
    }else{
        alert("Hatalı giriş");
    }
}

/* PANEL */
function updatePanel(){
    if(!currentUser){
        pUser.innerText="Giriş yap";
        return;
    }

    let data = JSON.parse(localStorage.getItem("acc_"+currentUser));

    pUser.innerText = "Kullanıcı: " + currentUser;
    pCredit.innerText = "Kredi: " + data.credit;
    pVIP.innerText = "VIP: " + (data.vip ? "Aktif" : "Yok");
}

/* SATIN ALMA */
function buyCredit(){
    if(!currentUser) return alert("Önce giriş yap");

    let data = JSON.parse(localStorage.getItem("acc_"+currentUser));
    data.credit += 100;

    localStorage.setItem("acc_"+currentUser, JSON.stringify(data));
    alert("Kredi eklendi");
    updatePanel();
}

function buyVIP(){
    if(!currentUser) return alert("Önce giriş yap");

    let data = JSON.parse(localStorage.getItem("acc_"+currentUser));
    data.vip = true;

    localStorage.setItem("acc_"+currentUser, JSON.stringify(data));
    alert("VIP aktif!");
    updatePanel();
}

</script>

</body>
</html>
