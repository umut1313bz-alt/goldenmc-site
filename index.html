<!DOCTYPE html>

<html lang="tr">
<head>
<meta charset="UTF-8">
<title>GoldenMC</title>
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;600;800&display=swap" rel="stylesheet">

<style>
body{
margin:0;
font-family:Poppins;
background:linear-gradient(135deg,#0f172a,#1e0033);
color:white;
}

.navbar{
display:flex;
justify-content:space-between;
padding:15px 40px;
background:#020617;
}

.logo{
color:gold;
font-weight:800;
font-size:22px;
}

.menu a{
color:white;
margin:10px;
text-decoration:none;
}

.hero{
text-align:center;
padding:60px;
}

.section{
padding:40px;
}

.cards{
display:flex;
flex-wrap:wrap;
gap:20px;
justify-content:center;
}

.card{
background:#111827;
padding:20px;
border-radius:15px;
width:220px;
text-align:center;
transition:0.3s;
}

.card:hover{
transform:scale(1.05);
box-shadow:0 0 20px gold;
}

button{
padding:10px;
border:none;
border-radius:10px;
background:gold;
cursor:pointer;
font-weight:600;
}

input{
padding:10px;
margin:5px;
border-radius:8px;
border:none;
}

.copy{
background:#22c55e;
}

</style>

</head>

<body>

<div class="navbar">
<div class="logo">🟡 GoldenMC</div>
<div class="menu">
<a href="#">Ana Sayfa</a>
<a href="#kredi">Kredi</a>
<a href="#store">VIP</a>
<a href="#login">Giriş</a>
</div>
</div>

<div class="hero">
<h1>GoldenMC Sunucusuna Hoşgeldin</h1>
<p>En iyi Minecraft deneyimi burada!</p>

<button class="copy" onclick="kopyala()">IP Kopyala</button>

</div>

<!-- KREDİ -->

<div class="section" id="kredi">
<h2>Kredi Satın Al</h2>

<div class="cards">
<div class="card"><h3>50 Kredi</h3><p>50 TL</p><button onclick="kredi(50)">Satın Al</button></div>
<div class="card"><h3>100 Kredi</h3><p>100 TL</p><button onclick="kredi(100)">Satın Al</button></div>
<div class="card"><h3>200 Kredi</h3><p>200 TL</p><button onclick="kredi(200)">Satın Al</button></div>
</div>
</div>

<!-- VIP -->

<div class="section" id="store">
<h2>VIP Mağaza</h2>

<div class="cards">
<div class="card"><h3>VIP</h3><p>60 Kredi</p><button onclick="vip('VIP')">Al</button></div>
<div class="card"><h3>VIP+</h3><p>80 Kredi</p><button onclick="vip('VIP+')">Al</button></div>
<div class="card"><h3>KVIP</h3><p>120 Kredi</p><button onclick="vip('KVIP')">Al</button></div>
<div class="card"><h3>KVIP+</h3><p>160 Kredi</p><button onclick="vip('KVIP+')">Al</button></div>
</div>
</div>

<!-- GİRİŞ -->

<div class="section" id="login">
<h2>Giriş / Kayıt</h2>

<input placeholder="Kullanıcı adı">
<input placeholder="Şifre" type="password">

<br>
<button onclick="alert('Giriş yapıldı')">Giriş</button>
<button onclick="alert('Kayıt olundu')">Kayıt</button>
</div>

<!-- ÖDEME -->

<div class="section">
<h2>Ödeme Bildir</h2>

<input placeholder="Nick">
<input type="file">
<button onclick="alert('Gönderildi!')">Gönder</button>
</div>

<script>

function kopyala(){
navigator.clipboard.writeText("seninsunucu.falixsrv.me");
alert("IP kopyalandı!");
}

function kredi(m){
alert(
m+" TL gönder\n\n"+
"Paycell: 05XXXXXXXXX\n"+
"Açıklamaya nick yaz!"
);
}

function vip(v){
alert(
v+" almak için önce kredi satın al!\n"+
"Sonra yetkiliye yaz."
);
}

</script>

</body>
</html>
